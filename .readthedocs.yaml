# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Install the package so autodoc can import it
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - analysis          # pandas + matplotlib for optional-import modules
    - requirements: docs/requirements.txt

# Sphinx docs location
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

# Formats to build
formats:
  - pdf
  - epub
