name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # Unit tests across Python versions
  # --------------------------------------------------------------------------
  tests:
    name: "Tests – Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true   # needed for 3.14 while in beta/RC

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          # rdkit is available on PyPI since 2022
          pip install "rdkit>=2022.3" numpy pandas pytest pytest-cov
          pip install -e ".[analysis]"

      - name: Run fast tests (exclude slow concordance)
        run: pytest tests/ -m "not slow" --tb=short --cov=pyCSRML --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # --------------------------------------------------------------------------
  # Concordance test (slow, runs on main only)
  # --------------------------------------------------------------------------
  concordance:
    name: "Concordance test (Richard 2023)"
    runs-on: ubuntu-latest
    # Only run on push to main or explicit dispatch to save CI minutes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "rdkit>=2022.3" numpy pandas pytest
          pip install -e ".[analysis]"

      - name: Run concordance tests
        run: pytest tests/test_chemotyper_concordance.py -v -s

  # --------------------------------------------------------------------------
  # Pylint
  # --------------------------------------------------------------------------
  lint:
    name: "Pylint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pylint and package
        run: |
          python -m pip install --upgrade pip
          pip install "rdkit>=2022.3" numpy pandas matplotlib
          pip install pylint
          pip install -e "."

      - name: Run pylint
        run: |
          pylint pyCSRML/ \
            --fail-under=7.0 \
            --disable=missing-module-docstring,too-many-arguments,too-many-instance-attributes,too-few-public-methods,import-outside-toplevel,broad-exception-caught \
            --max-line-length=120

  # --------------------------------------------------------------------------
  # Build check (ensure the wheel & sdist build correctly)
  # --------------------------------------------------------------------------
  build:
    name: "Build distribution"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*
